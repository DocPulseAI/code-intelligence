name: Route Resolution CI

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (CI hardening suite)
        run: |
          pytest -q \
            tests/test_golden_files.py \
            tests/test_ci_determinism.py \
            tests/test_performance_budget.py \
            tests/test_memory_budget.py \
            tests/test_schema_contract.py \
            tests/test_failure_contracts.py \
            tests/test_symbol_graph_determinism.py \
            tests/test_breaking_change_engine.py \
            tests/test_schema_breaks.py \
            tests/test_risk_scoring.py \
            tests/test_route_resolution_engine.py \
            tests/test_enterprise_structured_layers.py \
            tests/test_non_express_safety.py \
            --cov=src --cov=main --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
