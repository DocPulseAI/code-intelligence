name: CI - codeDetect Pipeline

on:
    push:
        branches:
            - epic-1
        paths:
            - "codeDetect/**"
            - ".github/workflows/ci-docs.yml"
    pull_request:
        branches:
            - epic-1
        paths:
            - "codeDetect/**"
    workflow_dispatch:

jobs:
    lint-and-test:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: codeDetect

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python 3.9
              uses: actions/setup-python@v5
              with:
                  python-version: "3.9"
                  cache: "pip"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt flake8 pylint

            - name: Lint with flake8
              run: |
                  # Stop the build if there are Python syntax errors or undefined names
                  flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=__pycache__,venv,.venv
                  # Exit-zero treats all errors as warnings
                  flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics --exclude=__pycache__,venv,.venv
              continue-on-error: true

            - name: Syntax check with pylint
              run: |
                  pylint main.py service_bus.py src/ --disable=all --enable=syntax-error,undefined-variable || true
              continue-on-error: true

            - name: Run pytest
              run: |
                  pytest tests/ -v --tb=short --maxfail=5 2>&1 | head -1000

    docker-build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: codeDetect

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker image
              uses: docker/build-push-action@v5
              with:
                  context: ./codeDetect
                  push: false
                  tags: code-detect:ci-${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    startup-validation:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: codeDetect

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python 3.9
              uses: actions/setup-python@v5
              with:
                  python-version: "3.9"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Validate Flask startup (no before_serving decorator)
              run: |
                  python -c "
                  import sys
                  with open('main.py', 'r') as f:
                      content = f.read()
                      if '@app.before_serving' in content or '@app.after_serving' in content:
                          print('ERROR: Unsupported Flask decorators found in main.py')
                          sys.exit(1)
                      if '@app.before_request' in content:
                          print('✓ Flask startup uses compatible @app.before_request hook')
                      else:
                          print('WARNING: No startup hook found')
                  "

            - name: Import main module (startup validation)
              run: |
                  python -c "import main; print('✓ main.py imports successfully')"

    summary:
        runs-on: ubuntu-latest
        needs: [lint-and-test, docker-build, startup-validation]
        if: always()
        steps:
            - name: Check build results
              run: |
                  echo "=== CI Pipeline Summary ==="
                  echo "Lint & Test: ${{ needs.lint-and-test.result }}"
                  echo "Docker Build: ${{ needs.docker-build.result }}"
                  echo "Startup Validation: ${{ needs.startup-validation.result }}"
                  if [[ "${{ needs.docker-build.result }}" == "failure" ]] || [[ "${{ needs.startup-validation.result }}" == "failure" ]]; then
                    exit 1
                  fi
